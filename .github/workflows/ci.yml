name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Windows build and test
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Go toolchain
        working-directory: OmniProxyBackend
        run: |
          go env -w GOTOOLCHAIN=auto
          go version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OmniProxyBackend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: OmniProxyBackend/frontend
        run: npm ci

      - name: Test backend
        working-directory: OmniProxyBackend
        run: go test ./...

      - name: Test frontend
        working-directory: OmniProxyBackend/frontend
        run: npm test

      - name: Build frontend
        working-directory: OmniProxyBackend/frontend
        run: npm run build

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop app
        working-directory: OmniProxyBackend
        run: |
          $wails = Join-Path (go env GOPATH) "bin\wails.exe"
          & $wails build -clean -ldflags "-X main.appVersion=ci"

  macos:
    name: macOS universal build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Go toolchain
        working-directory: OmniProxyBackend
        run: |
          go env -w GOTOOLCHAIN=auto
          go version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OmniProxyBackend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: OmniProxyBackend/frontend
        run: npm ci

      - name: Test backend
        working-directory: OmniProxyBackend
        run: go test ./...

      - name: Test frontend
        working-directory: OmniProxyBackend/frontend
        run: npm test

      - name: Build frontend
        working-directory: OmniProxyBackend/frontend
        run: npm run build

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build universal desktop app
        working-directory: OmniProxyBackend
        run: |
          "$(go env GOPATH)/bin/wails" build -clean -platform darwin/universal -ldflags "-X main.appVersion=ci"
