name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Windows build and test
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Go toolchain
        working-directory: OmniProxyBackend
        run: |
          go env -w GOTOOLCHAIN=auto
          go version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OmniProxyBackend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: OmniProxyBackend/frontend
        run: npm ci

      - name: Test backend
        working-directory: OmniProxyBackend
        run: go test ./...

      - name: Test frontend
        working-directory: OmniProxyBackend/frontend
        run: npm test

      - name: Build frontend
        working-directory: OmniProxyBackend/frontend
        run: npm run build

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop app
        working-directory: OmniProxyBackend
        run: |
          $wails = Join-Path (go env GOPATH) "bin\wails.exe"
          & $wails build -clean -ldflags "-X main.appVersion=ci"

  macos:
    name: macOS universal build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Go toolchain
        working-directory: OmniProxyBackend
        run: |
          go_version="$(awk '/^go / {print $2; exit}' go.mod)"
          case "$(uname -m)" in
            arm64) go_arch="arm64" ;;
            x86_64) go_arch="amd64" ;;
            *) echo "Unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          archive="go${go_version}.0.darwin-${go_arch}.tar.gz"
          curl -fsSL "https://go.dev/dl/$archive" -o "$RUNNER_TEMP/$archive"
          tar -C "$RUNNER_TEMP" -xzf "$RUNNER_TEMP/$archive"
          echo "$RUNNER_TEMP/go/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/go/bin:$PATH"
          go env -w GOTOOLCHAIN=auto
          go version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OmniProxyBackend/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: OmniProxyBackend/frontend
        run: npm ci

      - name: Test backend
        working-directory: OmniProxyBackend
        run: go test ./...

      - name: Test frontend
        working-directory: OmniProxyBackend/frontend
        run: npm test

      - name: Build frontend
        working-directory: OmniProxyBackend/frontend
        run: npm run build

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build universal desktop app
        working-directory: OmniProxyBackend
        run: |
          "$(go env GOPATH)/bin/wails" build -clean -platform darwin/universal -ldflags "-X main.appVersion=ci"
