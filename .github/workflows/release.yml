name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos_preview:
    name: macOS universal unsigned preview
    runs-on: macos-latest
    needs: windows

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [[ -z "$tag" ]]; then
            tag="${{ github.ref_name }}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          prerelease=false
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          fi
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Prepare Go toolchain
        working-directory: OmniProxyBackend
        run: |
          go_version="$(awk '/^go / {print $2; exit}' go.mod)"
          case "$(uname -m)" in
            arm64) go_arch="arm64" ;;
            x86_64) go_arch="amd64" ;;
            *) echo "Unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          archive="go${go_version}.0.darwin-${go_arch}.tar.gz"
          curl -fsSL "https://go.dev/dl/$archive" -o "$RUNNER_TEMP/$archive"
          tar -C "$RUNNER_TEMP" -xzf "$RUNNER_TEMP/$archive"
          echo "$RUNNER_TEMP/go/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/go/bin:$PATH"
          go env -w GOTOOLCHAIN=auto
          go version

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test backend
        working-directory: OmniProxyBackend
        run: go test ./...

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build macOS universal app
        working-directory: OmniProxyBackend
        shell: bash
        run: |
          version="${{ steps.release.outputs.tag }}"
          "$(go env GOPATH)/bin/wails" build -clean -platform darwin/universal -ldflags "-X main.appVersion=$version"
          clean_version="${version#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $clean_version" build/bin/OmniProxy.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $clean_version" build/bin/OmniProxy.app/Contents/Info.plist
          codesign --force --deep --sign - build/bin/OmniProxy.app

      - name: Package unsigned DMG for beta testing
        working-directory: OmniProxyBackend
        shell: bash
        run: |
          version="${{ steps.release.outputs.tag }}"
          asset="OmniProxy-$version-darwin-universal-unsigned.dmg"
          mkdir -p build/dmg-root
          cp -R build/bin/OmniProxy.app build/dmg-root/
          ln -s /Applications build/dmg-root/Applications
          hdiutil create -volname "OmniProxy" -srcfolder build/dmg-root -ov -format UDZO "$asset"
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload macOS preview artifact
        uses: actions/upload-artifact@v6
        with:
          name: OmniProxy-${{ steps.release.outputs.tag }}-darwin-universal-unsigned
          path: |
            OmniProxyBackend/OmniProxy-${{ steps.release.outputs.tag }}-darwin-universal-unsigned.dmg
            OmniProxyBackend/OmniProxy-${{ steps.release.outputs.tag }}-darwin-universal-unsigned.dmg.sha256
          retention-days: 14

      - name: Attach macOS unsigned DMG to beta release
        if: steps.release.outputs.prerelease == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          repo="${{ github.repository }}"
          api_url="https://api.github.com/repos/$repo"

          release_json="$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api_url/releases/tags/$tag")"
          upload_url="$(python3 -c 'import json, sys; print(json.load(sys.stdin)["upload_url"].split("{")[0])' <<< "$release_json")"

          for file in \
            "OmniProxyBackend/OmniProxy-$tag-darwin-universal-unsigned.dmg" \
            "OmniProxyBackend/OmniProxy-$tag-darwin-universal-unsigned.dmg.sha256"; do
            name="$(basename "$file")"
            encoded_name="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "$name")"
            curl -fsSL -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file" \
              "$upload_url?name=$encoded_name" > /dev/null
          done

  windows:
    name: Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Resolve release tag
        id: release
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $tag"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $isPrerelease = $tag.Contains("-")
          "prerelease=$($isPrerelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Prepare Go toolchain
        working-directory: OmniProxyBackend
        run: |
          go env -w GOTOOLCHAIN=auto
          go version

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        run: |
          $makensisCommand = Get-Command makensis.exe -ErrorAction SilentlyContinue
          $makensis = if ($makensisCommand) { $makensisCommand.Source } else { "" }

          if ([string]::IsNullOrWhiteSpace($makensis)) {
            $candidateRoots = @(
              "${env:ProgramFiles(x86)}\NSIS",
              "${env:ProgramFiles}\NSIS",
              "${env:ChocolateyInstall}\lib\nsis\tools",
              "${env:ChocolateyInstall}\bin"
            ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and (Test-Path $_) }

            foreach ($root in $candidateRoots) {
              $candidate = Get-ChildItem -LiteralPath $root -Filter "makensis.exe" -File -Recurse -ErrorAction SilentlyContinue |
                Select-Object -First 1
              if ($candidate) {
                $makensis = $candidate.FullName
                break
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($makensis) -or -not (Test-Path $makensis)) {
            throw "makensis.exe was not found after Chocolatey NSIS install."
          }

          $nsisDir = Split-Path -Parent $makensis
          Write-Host "Using makensis.exe at $makensis"
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build NSIS installer
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ steps.release.outputs.tag }}"
          $wails = Join-Path (go env GOPATH) "bin\wails.exe"
          & $wails build -clean -nsis -ldflags "-X main.appVersion=$version"

      - name: Prepare release assets
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ steps.release.outputs.tag }}"
          Get-ChildItem -Path "build" -Recurse -File | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize

          $installer = Get-ChildItem -Path "build" -Recurse -Filter "*-installer.exe" |
            Where-Object { $_.FullName -notmatch "(?i)WebView|MicrosoftEdge" } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "NSIS installer was not found under build"
          }

          $installerAsset = "OmniProxy-Setup-$version-windows-amd64.exe"
          Copy-Item -LiteralPath $installer.FullName -Destination $installerAsset -Force
          $shaAsset = "$installerAsset.sha256"
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installerAsset
          "$($hash.Hash.ToLowerInvariant())  $installerAsset" | Set-Content -Path $shaAsset -Encoding ascii

      - name: Generate release notes
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ steps.release.outputs.tag }}"
          $curatedNotes = Join-Path ".." "docs/releases/$version.md"
          if (Test-Path $curatedNotes) {
            Copy-Item -LiteralPath $curatedNotes -Destination release-notes.md -Force
            return
          }

          & git fetch origin "master:refs/remotes/origin/master" --depth=1
          if ($LASTEXITCODE -eq 0) {
            $curatedNotesFromMaster = & git show "origin/master:docs/releases/$version.md" 2>$null
            if ($LASTEXITCODE -eq 0 -and $curatedNotesFromMaster) {
              $curatedNotesFromMaster | Set-Content -Path release-notes.md -Encoding utf8
              return
            }
          }

          $previousTag = & git describe --tags --abbrev=0 "$version^" 2>$null
          if ($LASTEXITCODE -ne 0) {
            $previousTag = ""
          }

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $range = $version
            $compareUrl = "https://github.com/mibgb65-cloud/OmniProxy/releases/tag/$version"
          } else {
            $range = "$previousTag..$version"
            $compareUrl = "https://github.com/mibgb65-cloud/OmniProxy/compare/$previousTag...$version"
          }

          $commits = & git log --pretty=format:"%s (%h)" $range
          if (-not $commits) {
            $commits = @("No commit changes were detected for this release.")
          }

          $notes = @(
            "# $version - Automated Release / 自动发布",
            "",
            "This release was built by GitHub Actions from the ``$version`` tag.",
            "此版本由 GitHub Actions 根据 ``$version`` 标签构建发布。",
            "",
            "##  Features / 新特性",
            "",
            "- **Release**: Published Windows installer and checksum assets.",
            "  - 发布 Windows 安装包和 SHA256 校验文件。",
            "",
            "##  Bug Fixes / 问题修复",
            "",
            "- **General**: No curated bug fixes were provided in ``docs/releases/$version.md``.",
            "  - 未在 ``docs/releases/$version.md`` 提供人工整理的问题修复。",
            "",
            "## ⚠️ Breaking Changes / 不兼容更新",
            "",
            "- **Attention**: No breaking changes were declared.",
            "  - **必读**: 未声明不兼容更新。",
            "",
            "##  Refactor & Performance / 重构与优化",
            ""
          )
          foreach ($commit in $commits) {
            $notes += "- **Changes**: Included ``$commit``."
            $notes += "  - 包含提交 ``$commit``。"
          }
          $notes += @(
            "",
            "---",
            "**Full Changelog / 完整更新日志**: $compareUrl"
          )
          $notes | Set-Content -Path release-notes.md -Encoding utf8

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $prerelease = [System.Boolean]::Parse("${{ steps.release.outputs.prerelease }}")
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $encodedTag = [System.Uri]::EscapeDataString($tag)
          $existingRelease = $null
          try {
            $existingRelease = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/tags/$encodedTag"
          } catch {
            if (-not $_.Exception.Response -or [int]$_.Exception.Response.StatusCode -ne 404) {
              throw
            }
          }

          if ($existingRelease) {
            Write-Host "Deleting existing release $($existingRelease.id) for tag $tag"
            Invoke-RestMethod -Method Delete -Headers $headers -Uri $existingRelease.url | Out-Null
          }

          $body = Get-Content -LiteralPath "OmniProxyBackend/release-notes.md" -Raw
          $payload = @{
            tag_name = $tag
            name = "OmniProxy $tag"
            body = $body
            draft = $false
            prerelease = $prerelease
          } | ConvertTo-Json -Depth 4

          $release = Invoke-RestMethod `
            -Method Post `
            -Headers $headers `
            -ContentType "application/json" `
            -Uri "https://api.github.com/repos/$repo/releases" `
            -Body $payload

          $uploadUrl = $release.upload_url.Split("{")[0]
          $assetPaths = @(
            "OmniProxyBackend/OmniProxy-Setup-$tag-windows-amd64.exe",
            "OmniProxyBackend/OmniProxy-Setup-$tag-windows-amd64.exe.sha256"
          )

          foreach ($assetPath in $assetPaths) {
            $asset = Get-Item -LiteralPath $assetPath
            $assetName = [System.Uri]::EscapeDataString($asset.Name)
            Write-Host "Uploading release asset $($asset.Name)"
            Invoke-RestMethod `
              -Method Post `
              -Headers $headers `
              -ContentType "application/octet-stream" `
              -Uri "${uploadUrl}?name=$assetName" `
              -InFile $asset.FullName | Out-Null
          }
