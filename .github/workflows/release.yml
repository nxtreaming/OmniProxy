name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: OmniProxyBackend/go.mod
          cache-dependency-path: OmniProxyBackend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OmniProxyBackend/frontend/package-lock.json

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        run: |
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          $makensis = Join-Path $nsisDir "makensis.exe"
          if (-not (Test-Path $makensis)) {
            throw "makensis.exe was not found at $makensis"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build NSIS installer
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ github.ref_name }}"
          $wails = Join-Path (go env GOPATH) "bin\wails.exe"
          & $wails build -clean -nsis -ldflags "-X main.appVersion=$version"

      - name: Prepare release assets
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ github.ref_name }}"
          Get-ChildItem -Path "build" -Recurse -File | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize

          $installer = Get-ChildItem -Path "build" -Recurse -Filter "*-installer.exe" |
            Where-Object { $_.FullName -notmatch "(?i)WebView|MicrosoftEdge" } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "NSIS installer was not found under build"
          }

          $installerAsset = "OmniProxy-Setup-$version-windows-amd64.exe"
          Copy-Item -LiteralPath $installer.FullName -Destination $installerAsset -Force
          $shaAsset = "$installerAsset.sha256"
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installerAsset
          "$($hash.Hash.ToLowerInvariant())  $installerAsset" | Set-Content -Path $shaAsset -Encoding ascii

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OmniProxy ${{ github.ref_name }}
          overwrite_files: true
          files: |
            OmniProxyBackend/OmniProxy-Setup-${{ github.ref_name }}-windows-amd64.exe
            OmniProxyBackend/OmniProxy-Setup-${{ github.ref_name }}-windows-amd64.exe.sha256
          body: |
            # OmniProxy ${{ github.ref_name }} 🎉

            第三个公开版本，聚焦桌面端启动体验、模型记录准确性、历史页刷新和额度状态同步。

            ## 下载

            - `OmniProxy-Setup-${{ github.ref_name }}-windows-amd64.exe`：Windows 安装包，推荐下载。
            - `OmniProxy-Setup-${{ github.ref_name }}-windows-amd64.exe.sha256`：安装包 SHA256 校验文件。

            ## 亮点

            - 新增单实例启动逻辑：重复打开时会激活已有窗口，开发客户端和发布客户端可以共存。
            - 修复请求历史和实时日志中的模型记录，支持从请求体、查询参数以及响应体 / SSE 中补全模型名。
            - 历史页面仅在激活时刷新，避免后台页面持续拉取数据。
            - 额度刷新改为每 30 秒自动刷新正在使用的账号，不再绑定到任务结束后的刷新流程。
            - 前端日志增加模型展示，诊断与历史刷新交互更清晰。
            - 补齐模型解析、历史存储、额度刷新和运行周期相关测试。

            ## 升级说明

            - 升级后如果重复启动 OmniProxy，新进程会直接唤起已有窗口。
            - 开发模式和正式安装包使用不同实例标识，可以同时运行用于调试。

            ## 安全提示

            OmniProxy 默认面向本地个人开发场景，只监听 `127.0.0.1`。请不要把真实凭据提交到 GitHub。
