name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Resolve release tag
        id: release
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $tag"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $isPrerelease = $tag.Contains("-")
          "prerelease=$($isPrerelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: OmniProxyBackend/go.mod
          cache-dependency-path: OmniProxyBackend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OmniProxyBackend/frontend/package-lock.json

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        run: |
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          $makensis = Join-Path $nsisDir "makensis.exe"
          if (-not (Test-Path $makensis)) {
            throw "makensis.exe was not found at $makensis"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build NSIS installer
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ steps.release.outputs.tag }}"
          $wails = Join-Path (go env GOPATH) "bin\wails.exe"
          $buildArgs = @("build", "-clean", "-nsis")
          if ("${{ steps.release.outputs.prerelease }}" -eq "true") {
            $buildArgs += @("-tags", "omniproxy_dev")
          }
          $buildArgs += @("-ldflags", "-X main.appVersion=$version")
          & $wails @buildArgs

      - name: Prepare release assets
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ steps.release.outputs.tag }}"
          Get-ChildItem -Path "build" -Recurse -File | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize

          $installer = Get-ChildItem -Path "build" -Recurse -Filter "*-installer.exe" |
            Where-Object { $_.FullName -notmatch "(?i)WebView|MicrosoftEdge" } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "NSIS installer was not found under build"
          }

          $installerAsset = "OmniProxy-Setup-$version-windows-amd64.exe"
          Copy-Item -LiteralPath $installer.FullName -Destination $installerAsset -Force
          $shaAsset = "$installerAsset.sha256"
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installerAsset
          "$($hash.Hash.ToLowerInvariant())  $installerAsset" | Set-Content -Path $shaAsset -Encoding ascii

      - name: Generate release notes
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ steps.release.outputs.tag }}"
          $curatedNotes = Join-Path ".." "docs/releases/$version.md"
          if (Test-Path $curatedNotes) {
            Copy-Item -LiteralPath $curatedNotes -Destination release-notes.md -Force
            return
          }

          & git fetch origin "master:refs/remotes/origin/master" --depth=1
          if ($LASTEXITCODE -eq 0) {
            $curatedNotesFromMaster = & git show "origin/master:docs/releases/$version.md" 2>$null
            if ($LASTEXITCODE -eq 0 -and $curatedNotesFromMaster) {
              $curatedNotesFromMaster | Set-Content -Path release-notes.md -Encoding utf8
              return
            }
          }

          $previousTag = & git describe --tags --abbrev=0 "$version^" 2>$null
          if ($LASTEXITCODE -ne 0) {
            $previousTag = ""
          }

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $range = $version
            $compareUrl = "https://github.com/mibgb65-cloud/OmniProxy/releases/tag/$version"
          } else {
            $range = "$previousTag..$version"
            $compareUrl = "https://github.com/mibgb65-cloud/OmniProxy/compare/$previousTag...$version"
          }

          $commits = & git log --pretty=format:"%s (%h)" $range
          if (-not $commits) {
            $commits = @("No commit changes were detected for this release.")
          }

          $notes = @(
            "# $version - Automated Release / 自动发布",
            "",
            "This release was built by GitHub Actions from the ``$version`` tag.",
            "此版本由 GitHub Actions 根据 ``$version`` 标签构建发布。",
            "",
            "##  Features / 新特性",
            "",
            "- **Release**: Published Windows installer and checksum assets.",
            "  - 发布 Windows 安装包和 SHA256 校验文件。",
            "",
            "##  Bug Fixes / 问题修复",
            "",
            "- **General**: No curated bug fixes were provided in ``docs/releases/$version.md``.",
            "  - 未在 ``docs/releases/$version.md`` 提供人工整理的问题修复。",
            "",
            "## ⚠️ Breaking Changes / 不兼容更新",
            "",
            "- **Attention**: No breaking changes were declared.",
            "  - **必读**: 未声明不兼容更新。",
            "",
            "##  Refactor & Performance / 重构与优化",
            ""
          )
          foreach ($commit in $commits) {
            $notes += "- **Changes**: Included ``$commit``."
            $notes += "  - 包含提交 ``$commit``。"
          }
          $notes += @(
            "",
            "---",
            "**Full Changelog / 完整更新日志**: $compareUrl"
          )
          $notes | Set-Content -Path release-notes.md -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: OmniProxy ${{ steps.release.outputs.tag }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          overwrite_files: true
          body_path: OmniProxyBackend/release-notes.md
          files: |
            OmniProxyBackend/OmniProxy-Setup-${{ steps.release.outputs.tag }}-windows-amd64.exe
            OmniProxyBackend/OmniProxy-Setup-${{ steps.release.outputs.tag }}-windows-amd64.exe.sha256
