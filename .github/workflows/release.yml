name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: OmniProxyBackend/go.mod
          cache-dependency-path: OmniProxyBackend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: OmniProxyBackend/frontend/package-lock.json

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        run: |
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          $makensis = Join-Path $nsisDir "makensis.exe"
          if (-not (Test-Path $makensis)) {
            throw "makensis.exe was not found at $makensis"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build NSIS installer
        working-directory: OmniProxyBackend
        run: |
          $wails = Join-Path (go env GOPATH) "bin\wails.exe"
          & $wails build -clean -nsis

      - name: Prepare release assets
        working-directory: OmniProxyBackend
        run: |
          $version = "${{ github.ref_name }}"
          Get-ChildItem -Path "build" -Recurse -File | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize

          $installer = Get-ChildItem -Path "build" -Recurse -Filter "*-installer.exe" |
            Where-Object { $_.FullName -notmatch "(?i)WebView|MicrosoftEdge" } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "NSIS installer was not found under build"
          }

          $installerAsset = "OmniProxy-Setup-$version-windows-amd64.exe"
          Copy-Item -LiteralPath $installer.FullName -Destination $installerAsset -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OmniProxy ${{ github.ref_name }}
          overwrite_files: true
          files: |
            OmniProxyBackend/OmniProxy-Setup-${{ github.ref_name }}-windows-amd64.exe
          body: |
            # OmniProxy ${{ github.ref_name }} 🎉

            第二个公开版本，聚焦常驻后台、请求诊断、历史分析和代理稳定性。

            ## 下载

            - `OmniProxy-Setup-${{ github.ref_name }}-windows-amd64.exe`：Windows 安装包，推荐下载。

            ## 亮点

            - 新增请求历史页，支持按当前筛选条件导出 CSV / JSON。
            - 新增失败诊断面板，展示路由厂商、模型、账号、重试链路、状态码、耗时、错误摘要和冷却状态。
            - 新增系统托盘和开机自启，可在后台常驻并从托盘启动/停止代理、查看端口、打开主界面或退出。
            - 请求历史迁移到 SQLite，旧 `request_history.json` 会自动导入。
            - Token 增加冷却与健康检查状态，429 和 5xx 重试链路更清晰。
            - 代理路由和重试策略拆分，5xx 支持自动重试和短冷却。
            - 修复请求历史页窄窗口显示、诊断抽屉动效和托盘图标显示问题。

            ## 升级说明

            - 首次启动新版本时，会自动把旧请求历史导入到 `request_history.db`。
            - 如果 Windows 任务栏仍显示旧图标，可以重新固定新安装的 OmniProxy，或重启资源管理器刷新图标缓存。

            ## 安全提示

            OmniProxy 默认面向本地个人开发场景，只监听 `127.0.0.1`。请不要把真实凭据提交到 GitHub。
